<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - TrainITup</title>
    
    <script>
        if (localStorage.getItem('userRole') !== 'STUDENT') {
            window.location.replace("auth.html");
        }
    </script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/quiz.css">
    <link rel="stylesheet" href="../css/readability-fix.css">
</head>
<body>
    <div class="quiz-container">
        <!-- Back Navigation -->
        <nav class="quiz-header">
            <a href="student-dashboard.html" class="back-link">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>
        </nav>

        <!-- Quiz Selection Screen -->
        <div id="quizSelection" class="quiz-section active">
            <div class="quiz-wrapper">
                <h1 class="quiz-title">Available Quizzes</h1>
                <p class="quiz-subtitle">Test your knowledge with our interactive quizzes</p>
                
                <div class="quizzes-grid" id="quizzesGrid">
                    <!-- Quiz cards will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Quiz Taking Screen -->
        <div id="quizTaking" class="quiz-section">
            <div class="quiz-wrapper">
                <!-- Quiz Progress Bar -->
                <div class="quiz-progress-container">
                    <div class="quiz-header-info">
                        <h2 id="quizTitle" class="quiz-name"></h2>
                        <div class="quiz-progress">
                            <span id="questionCounter">1/0</span>
                            <div class="progress">
                                <div id="progressBar" class="progress-bar bg-primary" role="progressbar" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="quiz-timer">
                        <i class="bi bi-clock"></i>
                        <span id="timer">00:00</span>
                    </div>
                </div>

                <!-- Question Section -->
                <div class="question-container">
                    <h3 id="questionText" class="question-text"></h3>
                    <div id="optionsContainer" class="options-grid">
                        <!-- Options will be loaded here -->
                    </div>
                </div>

                <!-- Navigation Buttons -->
                <div class="quiz-navigation">
                    <button id="prevBtn" class="btn btn-outline-secondary rounded-pill" onclick="previousQuestion()">
                        <i class="bi bi-chevron-left"></i> Previous
                    </button>
                    <button id="submitBtn" class="btn btn-primary rounded-pill d-none" onclick="submitQuiz()">
                        <i class="bi bi-check-circle"></i> Submit Quiz
                    </button>
                    <button id="nextBtn" class="btn btn-primary rounded-pill" onclick="nextQuestion()">
                        Next <i class="bi bi-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="quizResults" class="quiz-section">
            <div class="quiz-wrapper">
                <div class="results-container text-center">
                    <div class="score-circle">
                        <div class="score-number">
                            <span id="finalScore">0</span>%
                        </div>
                        <div class="score-label">Your Score</div>
                    </div>

                    <h2 id="resultTitle" class="mt-4 mb-2"></h2>
                    <p id="resultMessage" class="text-muted mb-4"></p>

                    <div class="result-stats">
                        <div class="stat">
                            <div class="stat-label">Correct Answers</div>
                            <div class="stat-value"><span id="correctCount">0</span>/<span id="totalCount">0</span></div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Time Taken</div>
                            <div class="stat-value" id="timeTaken">00:00</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Percentage</div>
                            <div class="stat-value"><span id="percentageDisplay">0</span>%</div>
                        </div>
                    </div>

                    <div class="answer-review mt-5">
                        <h4 class="mb-3">Answer Review</h4>
                        <div id="answerReviewContainer" class="review-list">
                            <!-- Answer review items will be loaded here -->
                        </div>
                    </div>

                    <div class="results-actions mt-4">
                        <button onclick="retakeQuiz()" class="btn btn-primary rounded-pill me-2">
                            <i class="bi bi-arrow-repeat"></i> Retake Quiz
                        </button>
                        <button onclick="backToQuizzes()" class="btn btn-outline-secondary rounded-pill">
                            <i class="bi bi-arrow-left"></i> Back to Quizzes
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../javascript/quiz.js"></script>
</body>
</html>
