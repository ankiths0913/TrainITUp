<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details - TrainITup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/readability-fix.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg bg-white shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-success" href="index.html"><i class="bi bi-arrow-left"></i> Back to Courses</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="ratio ratio-16x9">
                        <iframe id="videoPlayer" src="" title="YouTube video player" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="card-body">
                        <h2 id="courseTitle" class="fw-bold">Loading...</h2>
                        <p id="courseEducator" class="text-muted"></p>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card border-0 shadow-sm p-4">
                    <h5 class="fw-bold mb-3">Course Materials</h5>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span><i class="bi bi-file-earmark-pdf text-danger"></i> Lecture Notes</span>
                            <button class="btn btn-sm btn-light border">Download</button>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span><i class="bi bi-chat-left-text text-primary"></i> Discussion Forum</span>
                            <span class="badge bg-success rounded-pill">Active</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="../javascript/app.js"></script>
</body>
</html>
