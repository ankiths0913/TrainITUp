<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Learnings | TrainITup</title>
    
    <script>
        // Security: Students only (or anyone logged in)
        if (!localStorage.getItem('userId')) {
            window.location.replace("auth.html");
        }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/my-courses.css">
    <link rel="stylesheet" href="../css/readability-fix.css">

</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html"><span class="text-success">Train</span>ITup</a>
            <div class="d-flex align-items-center">
                <a href="index.html" class="text-white me-4 text-decoration-none small">Browse Courses</a>
                <button onclick="localStorage.clear(); window.location.replace('auth.html')" class="btn btn-sm btn-outline-light rounded-pill">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="mb-5">
            <h2 class="fw-bold">My Learning Library</h2>
            <p class="text-muted">Pick up right where you left off.</p>
        </div>

        <div class="row g-4" id="enrolledCoursesGrid">
            </div>
    </div>

    <script>
        async function loadMyCourses() {
            const userId = localStorage.getItem('userId');
            const grid = document.getElementById('enrolledCoursesGrid');

            try {
                // This calls your EnrollmentController to get courses for this user
                const response = await fetch(`http://localhost:8080/api/enrollments/user/${userId}`);
                const courses = await response.json();

                if (courses.length === 0) {
                    grid.innerHTML = `
                        <div class="col-12 text-center py-5">
                            <i class="bi bi-emoji-smile fs-1 text-muted"></i>
                            <h4 class="mt-3">No courses joined yet!</h4>
                            <a href="index.html" class="btn btn-success mt-2">Start Browsing</a>
                        </div>`;
                    return;
                }

                grid.innerHTML = courses.map(course => `
                    <div class="col-md-4 col-lg-3">
                        <div class="card course-card shadow-sm">
                            <img src="${course.imageUrl}" class="card-img-top p-2 rounded-4" style="height:160px; object-fit:cover;">
                            <div class="card-body d-flex flex-column">
                                <h6 class="fw-bold mb-1">${course.title}</h6>
                                <p class="text-muted small mb-3">By ${course.educator}</p>
                                
                                <div class="mt-auto">
                                    <div class="progress mb-2" style="height: 6px;">
                                        <div class="progress-bar w-25" role="progressbar"></div>
                                    </div>
                                    <button class="btn btn-dark btn-sm w-100 rounded-pill" onclick="startLearning(${course.id})">
                                        Continue <i class="bi bi-play-fill ms-1"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error("Error loading courses:", error);
            }
        }

        function startLearning(courseId) {
            window.location.href = `course-detail.html?id=${courseId}`;
        }

        window.onload = loadMyCourses;
    </script>
</body>
</html>
