# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/trainitup_db
spring.datasource.username=root
spring.datasource.password=root

# Tell Hibernate to automatically update tables if we change our Java code
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Set the server port to 8080
server.port=8080

# JWT Configuration
jwt.secret=trainitup_secret_key_that_should_be_at_least_32_characters_long_for_security
jwt.expiration=86400000

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

logging.level.org.springframework.security=DEBUG

# File Upload Configuration
file.upload.dir=uploads/courses
file.upload.max-size=10485760

# Multipart file upload configuration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB